    function getImageUrl(cardName){return "images/"+cardName.toLowerCase().replace(/ /g,"-")+".jpeg";}
    const deckEl=document.getElementById("deck"),drawBtn=document.getElementById("draw-button"),downloadBtn=document.getElementById("download-pdf-button"),statusEl=document.getElementById("status");let currentSpread=null;
    drawBtn.addEventListener("click",drawSpread);downloadBtn.addEventListener("click",downloadReadingPdf);
    function drawSpread(){deckEl.classList.add("shuffling");statusEl.textContent="Shuffling cards…";setTimeout(performDraw,700)}
    function performDraw(){const past=drawRandomCard(),present=drawRandomCard(),future=drawRandomCard();currentSpread={past,present,future};displayCard(past,"past");displayCard(present,"present");displayCard(future,"future");deckEl.classList.remove("shuffling");statusEl.textContent="Reading ready. You can draw again or download the PDF."}
    function drawRandomCard(){const card=tarotDeck[Math.floor(Math.random()*tarotDeck.length)],isReversed=Math.random()<.5,meaningText=isReversed?card.reversed.general:card.upright.general,predictionText=isReversed?card.reversed.prediction:card.upright.prediction;return{name:card.name,position:isReversed?"Reversed":"Upright",meaning:cleanSentence(meaningText),prediction:cleanSentence(predictionText),image:getImageUrl(card.name)}}
    function cleanSentence(text){if(!text)return"";let cleaned=String(text).trim().replace(/\s+/g," ");cleaned=cleaned.charAt(0).toUpperCase()+cleaned.slice(1);if(!/[.!?]$/.test(cleaned))cleaned+=".";return cleaned}
    function buildLongExplanation(card,slot){const positionText={past:"This card appears in the Past position to show the energy, memory, lesson, or emotional pattern that has helped shape the situation. It may describe something you have already moved through, something you are still carrying, or a past influence that is quietly affecting the present.",present:"This card appears in the Present position to show what is active around you now. It highlights the main energy, challenge, opportunity, or emotional truth that needs your attention at this moment.",future:"This card appears in the Future position to show the direction the energy may move toward if things continue as they are. It is not a fixed fate, but a meaningful sign of what may unfold and what you can prepare for."};const orientationText=card.position==="Reversed"?"Because this card is reversed, its message may be more internal, delayed, hidden, or blocked. It can suggest that something needs healing, patience, honesty, or release before the energy can flow more easily.":"Because this card is upright, its message is more open, direct, and available. It suggests that this energy is already present, becoming clearer, or ready to support growth and movement.";const coreText="The core meaning of "+card.name+" is: "+card.meaning+" "+card.prediction;const guidanceText={past:"The deeper lesson is to recognise what this experience taught you without letting it define the whole story. You may be ready to carry the wisdom forward while leaving behind the weight.",present:"The guidance is to slow down, notice what feels true, and respond from clarity rather than pressure. This card asks you to trust the message that is already trying to come through.",future:"The advice is to move forward with awareness, not fear. You still have choice, and this card gives you a chance to prepare, adjust, and step into the next phase with more confidence."};return[positionText[slot],orientationText,coreText,guidanceText[slot]]}
    function displayCard(card,slot){document.getElementById(slot+"-image").src=card.image;document.getElementById(slot+"-name").textContent=card.name;document.getElementById(slot+"-position").textContent=card.position;document.getElementById(slot+"-meaning").textContent=card.meaning;const narrativeEl=document.getElementById(slot+"-narrative");narrativeEl.innerHTML="";buildLongExplanation(card,slot).forEach(text=>{const p=document.createElement("p");p.textContent=text;narrativeEl.appendChild(p)})}
    async function imageToDataUrl(url){try{const response=await fetch(url,{cache:"no-store"});const blob=await response.blob();return await new Promise((resolve,reject)=>{const reader=new FileReader();reader.onloadend=()=>resolve(reader.result);reader.onerror=reject;reader.readAsDataURL(blob)})}catch(error){console.warn("Image could not be added to PDF:",url,error);return null}}
    async function downloadReadingPdf(){if(!currentSpread){alert("Please draw a reading first, then tap Download Full Reading as PDF.");return}if(!window.jspdf||!window.jspdf.jsPDF){alert("The PDF tool is still loading. Please wait a few seconds and tap again.");return}statusEl.textContent="Creating PDF…";const{jsPDF}=window.jspdf,pdf=new jsPDF("p","mm","a4"),pageWidth=pdf.internal.pageSize.getWidth(),pageHeight=pdf.internal.pageSize.getHeight(),margin=14;let y=18;function addWrappedText(text,x,maxWidth,lineHeight){const lines=pdf.splitTextToSize(text,maxWidth);lines.forEach(line=>{if(y>pageHeight-22){pdf.addPage();y=18}pdf.text(line,x,y);y+=lineHeight})}pdf.setFont("helvetica","bold");pdf.setFontSize(18);pdf.text("Premium Tarot Card Reading",pageWidth/2,y,{align:"center"});y+=8;pdf.setFont("helvetica","normal");pdf.setFontSize(10);pdf.text(new Date().toLocaleString(),pageWidth/2,y,{align:"center"});y+=12;const sections=[["Past",currentSpread.past],["Present",currentSpread.present],["Future",currentSpread.future]];for(const[label,card]of sections){if(y>245){pdf.addPage();y=18}pdf.setFont("helvetica","bold");pdf.setFontSize(14);pdf.text(label+": "+card.name+" ("+card.position+")",margin,y);y+=8;const imgData=await imageToDataUrl(card.image);if(imgData){try{pdf.addImage(imgData,"JPEG",margin,y,38,58)}catch(error){try{pdf.addImage(imgData,"PNG",margin,y,38,58)}catch(e){}}}pdf.setFont("helvetica","normal");pdf.setFontSize(10.5);const textX=imgData?margin+44:margin,textWidth=imgData?pageWidth-margin*2-44:pageWidth-margin*2,oldY=y;addWrappedText("Meaning: "+card.meaning,textX,textWidth,5);y=Math.max(y,oldY+(imgData?62:0));buildLongExplanation(card,label.toLowerCase()).forEach(paragraph=>{pdf.setFont("helvetica","normal");pdf.setFontSize(10.5);addWrappedText(paragraph,margin,pageWidth-margin*2,5);y+=3});y+=6}pdf.setFontSize(9);pdf.setTextColor(110);pdf.text("Generated by Premium Tarot Card Reader.",pageWidth/2,pageHeight-10,{align:"center"});const fileDate=new Date().toISOString().slice(0,10);pdf.save("tarot-reading-"+fileDate+".pdf");statusEl.textContent="PDF downloaded."}
    if("serviceWorker"in navigator){navigator.serviceWorker.register("service-worker.js").catch(err=>console.log("SW registration failed:",err))}
